<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>World Cup Pool 2026</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>World Cup Pool 2026</h1>
    <p class="subtitle" id="updated">Loading...</p>
  </header>

  <table id="rankings">
    <thead>
      <tr>
        <th>#</th>
        <th>Person</th>
        <th>Teams</th>
        <th class="numeric">P</th>
        <th class="numeric">W</th>
        <th class="numeric">D</th>
        <th class="numeric">L</th>
        <th class="numeric">GD</th>
        <th class="points">Pts</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <footer>Data via football-data.org. Updated automatically throughout the tournament.</footer>

  <script src="js/util.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
